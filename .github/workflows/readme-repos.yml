name: Atualizar lista de repositórios

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Buscar repositórios e atualizar README
        run: |
          # Busca repositórios via API do GitHub
          REPOS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/soujoaomoraes/repos?sort=updated&per_page=10" | \
            jq -r '.[] | select(.fork == false) | "| 🔹 [\(.name)](\(.html_url)) | \(.description // "No description") | `\(.language // "N/A")` |"' | \
            head -4)

          # Cria o novo conteúdo do README
          cat > README.md << 'EOF'
          ## 👋 About Me

          Hi! I'm passionate about technology, automation and building useful things. From time to time, you'll find new experiments and projects here 

          ## 🚀 Projects

          > Automatically updated via GitHub Actions

          | Project | Description | Language |
          |---|---|---|
          EOF

          # Adiciona tabela de repositórios
          echo "$REPOS" >> README.md

          # Adiciona timestamp
          echo "" >> README.md
          echo "" >> README.md
          echo "<div align=\"center\">" >> README.md
          echo "" >> README.md
          echo "📌 Last automatic update: **$(date -u '+%d/%m/%Y at %H:%M UTC')**" >> README.md
          echo "" >> README.md
          echo "</div>" >> README.md

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --staged --quiet; then
            echo "Nenhuma mudança detectada"
          else
            git commit -m "✨ Automatically update repositories list"
            git push
            echo "README updated successfully!"
          fi
